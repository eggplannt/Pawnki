name: Deploy to Production

on:
  push:
    branches: [main]

jobs:
  deploy-functions:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1

      - name: Deploy edge functions
        run: supabase functions deploy --project-ref yevpbrlirmpnqefirbur
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

  deploy-web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v1

      - name: Install dependencies
        run: bun install

      - name: Build web app
        run: cd apps/web && bun run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.PROD_SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.PROD_SUPABASE_PUBLISHABLE_KEY }}
          VITE_STRIPE_PUBLISHABLE_KEY: ${{ secrets.PROD_STRIPE_PUBLISHABLE_KEY }}
          VITE_STRIPE_PRICE_MONTHLY: ${{ secrets.PROD_STRIPE_PRICE_MONTHLY }}
          VITE_STRIPE_PRICE_ANNUAL: ${{ secrets.PROD_STRIPE_PRICE_ANNUAL }}
          VITE_ADSENSE_CLIENT_ID: ${{ secrets.PROD_ADSENSE_CLIENT_ID }}
          VITE_ADSENSE_SLOT_PRESESSION: ${{ secrets.PROD_ADSENSE_SLOT_PRESESSION }}
          VITE_SELF_HOSTED: false

      - name: Deploy to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: apps/web/dist/*
          target: /var/www/pawnki/web

      - name: Restart nginx
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: systemctl reload nginx
