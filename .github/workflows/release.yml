name: Release

on:
  push:
    tags: ['v*.*.*']

jobs:
  build-android:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v1
        with:
          bun-version: 1.3.14

      - name: Install dependencies
        run: bun install

      - uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Build Android APK
        working-directory: apps/expo
        run: |
          BUILD_JSON=$(eas build --platform android --profile preview --non-interactive --wait --json 2>/dev/null)
          APK_URL=$(echo "$BUILD_JSON" | jq -r '.[0].artifacts.buildUrl // .[0].artifacts.applicationArchiveUrl // empty')
          if [ -z "$APK_URL" ]; then
            echo "Could not extract APK URL from build output:"
            echo "$BUILD_JSON"
            exit 1
          fi
          curl -fL "$APK_URL" -o "../../pawnki-${{ github.ref_name }}.apk"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          files: pawnki-${{ github.ref_name }}.apk
          generate_release_notes: true
