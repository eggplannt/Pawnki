<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pawnki</title>
    <meta name="description" content="Build your chess opening repertoire with spaced repetition." />
    <link rel="icon" href="/favicon_io/favicon.ico" sizes="any" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon_io/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon_io/favicon-16x16.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/favicon_io/apple-touch-icon.png" />
    <link rel="manifest" href="/favicon_io/site.webmanifest" />
  </head>
  <body>
    <script>
      // Apply theme + bg color before render to prevent flash
      (function(){var t=localStorage.getItem('pawnki-theme');if(!t)t=matchMedia('(prefers-color-scheme:light)').matches?'light':'dark';if(t==='light')document.documentElement.classList.add('light');var s=document.documentElement.style;s.backgroundColor=t==='light'?'#f6f3ed':'#020303';s.color=t==='light'?'#1a2420':'#f0ebe3'})();
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
